body:
  text: 辨病源第一陽明燥令司天之年或秋冬之交天久不雨燥氣盛行邪客於肺伏而化火至初春雨水驟至春寒外加夏至後發者更重少陽相火不能遂其條達之機遂挾少陰君火循經絡而上與所伏之燥火互相沖激猝乘咽喉清竅而出或發白塊或白點名曰白喉互相傳染大人易治小兒難治時疫喉症不外外感六淫為病六淫者即經所謂風寒燥濕暑火六氣是也歷考古人喉科方論言風火者固多言寒濕者亦頗不乏獨未有專言燥氣為病者蓋內經脫秋傷於燥一條後人遂有燥氣不為病之說至沈自南喻嘉言始各有所得各出方論沈氏以化氣為濕為主故立方偏於苦辛微溫喻氏以復氣為火為主故立方偏於辛涼甘寒賴吳鞠通氏有燥氣為病輕則為燥重則為寒化氣為濕復氣為火數語而燥氣發病之理始著後之治燥氣者亦有門逕可入欲治白喉者非先讀沈喻吳三先生之書恐終無從下手此症之發必於燥氣盛行之年且見症經脈傳變治法無一不與燥火二字吻合故知病屬燥氣無疑詳觀後辨自明唯間多挾少陽相火少陰君火而發不得不兼治耳鄭氏梅澗雖言此症或遇燥氣流行而發而支離龐雜尚非真能探及源頭者至張氏漫言火熱喉症屬火熱者比比皆是耐修氏言肺之灼由於胃之熱胃之熱實由於腸之寒模糊影響全無確見更不足辨矣大人小兒治法本同何分難易實以小兒在五六齡以內者未識人事看驗服藥處處不能如法故治之較難也辨經絡第二素問陰陽別論篇曰一陰一陽結謂之喉痹一陰指少陰一陽指少陽少陽主相火少陰主君火故凡一切風火喉痹莫不揭重二經主治而白喉則獨以手太陰為本以二經為標蓋二經為病主風火而太陰為病主燥氣其有傳及他經者皆非白喉本有之症或因循不治與治不得法火毒漫延累及他經也知其所在以法治之張氏紹修曰此症當作足三陰受病傳至於肺且引十二經脈足太陰之脈上膈挾咽連舌本散舌下足少陰之脈循喉嚨挾舌本足厥陰之脈循喉嚨之上入頏顙下絡舌本為證不知十二經之脈除足太陽外其餘十一經皆內循喉嚨不獨足三陰也且既言足三陰受病必有足三陰見症今內經傷寒具在可覆按也足厥陰為肝素問刺熱篇曰肝熱病者小便先黃腹痛多臥身熱熱爭則狂言及驚脅滿疼手足躁不得安臥而傷寒論厥陰篇提綱亦言厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔今白喉初起有是候乎足少陰為腎刺熱篇曰腎熱病者先腰痛胻痠苦渴數飲身熱熱爭則項痛而強胻寒且酸足下熱不欲言其逆則頭痛員員澹澹然而傷寒論足少陰篇提綱亦言少陰之為病脈微細但欲寐今白喉初起又有是候乎足太陰為脾刺熱篇曰脾熱病者先頭重頰痛煩心顏青欲嘔身熱熱爭則腰痛不可用俯仰腹滿泄兩頷痛而傷寒論足太陰篇提綱亦言足太陰之為病腹滿而吐食不下自利益甚時腹自痛今白喉初起又有是症乎既無是症其不得妄指為足三陰明矣唯刺熱篇肺熱病一條所列之候與白喉初起一一吻合詳下症治第一條而一陰一陽結為喉痹亦為古來治喉家所自祖聖訓昭然不知徵引反憑虛懸揣以毫無關涉之足三陰當之或泛言肺腎或言胃熱腸寒愈去愈遠甚矣著書之難也此症於初起時認明三經脈候有無兼症對病用藥未有不應手奏效者即已誤治傳及他經亦須細心察驗確知何經見症治以何經之藥未必不可斡旋也辨色第三時疫喉病喉間必紅腫甚則紫而此症則獨發白或點或片或塊色如雞脂或發熱後數日始見或頃刻滿喉病勢雖有輕重之不同其為手太陰燥火則一服藥後轉為微黃色者病將已也其間有紅腫者以挾少陽相火少陰君火也紫則火勢劇而成毒矣張紹修曰此症熱症多寒症少善按果系時疫白喉必無寒症有以色白為寒者不知此症初發於肺肺屬金其色白為五臟六腑之華蓋處至高之位毒氣自下熏蒸而上二語未確肺病日深故本色日著云云恰與內經肺熱病者色白而毛敗又肺風之狀色皏然白數語相發明鄙意更有進者肺色既白而所傷之病又為燥燥氣屬金金為西方白虎其色亦白故他經熱喉病不發白而此獨發白也其間有紅紫者則挾君相二火矣辨脈第四白喉病初起餘脈如平但右寸微數而澀或沉數者手太陰伏邪本病也其浮數或緊者挾有外感時邪也左寸關動數者少陽相火少陰君火併病也洪滑者火鬱而成痰也延之日久或經誤治兩手脈滑數甚按之搏指者火勢劇也洪大無力按之芤或散大者陰涸已極也張紹修曰凡病此者兩關及左尺脈多沉數而躁其意專指足三陰受病而言以余所驗頗覺不然唯不腫不紅咽乾無痰手太陰燥火自病者右寸必微數而澀紅腫且痛初起即痰涎多挾有少陽少陰風火者左寸關必動數其他病脈皆誤治後始見初起時未必盡具也凡治內傷病必先脈而後症至六淫必脈症參合方有把握甚有舍脈從症者如伏脈與絕脈實難區別參之於症便易分曉若專恃察脈最易致誤此實閱歷以來屢試屢驗非欺人也辨手太陰本病症治第五白喉病初起頭痛身寒熱右寸脈微數而澀咽燥無痰喉間發白或咳或不咳或痛或不痛但介介如梗狀飲食如常此手太陰肺經燥氣本病加減喻氏清燥救肺湯主之右寸脈浮惡風寒甚者挾有外感時邪也前方略加辛涼藥如春則薄荷夏則荷葉扁豆花之類或已誤治咽燥舌乾甚或絳者鄭氏養陰清肺湯亦可用素問刺熱篇曰肺熱病者先淅然厥起毫毛惡風寒舌上苔黃身熱熱爭則喘咳痛走胸膺背不得太息頭痛不堪此症自始至終與經旨一一吻合故決為肺經本病主以加減喻氏清燥救肺湯以此方實燥氣化火之祖方中西洋參色白味苦性涼有清無補他參如高麗東洋潞黨及吉林參之類斷不可用恐其太補肺氣痰喘立至也石膏色白氣辛味甘性寒二味為清手太陰經燥火專門之藥復以麥冬則清中有滋矣臣以桑杏甘草則辛寒而合苦甘矣與內經燥淫於內治以辛寒佐以苦甘語恰合此症往往遇外感時邪而發有桑杏便無引邪入里之弊且性味清降較薄荷荷葉等味尤為易用至枇葉花露金汁不過佐使之藥藉以清熱解毒且疏通經隧不致留邪入絡遺患將來也平素痰多或服藥胃中覺寒可加入蔞貝橘枳等味者以藥在對病既有是症即可用是藥古人方中往往大開大闔寒熱溫涼並用如仲師之大青龍麻杏甘石等湯是也曩謂仲師二湯恰是治燥氣之祖方蓋化氣為濕麻桂可以散之復氣為火甘石可以清之極為合拍如白喉病發於秋冬之交重感外寒者似可先用麻杏甘石一二劑唯不可用青龍耳其仍用鄭氏養陰清肺湯者以既經誤治肺陰受傷並及營血非冬地丹芍實難奏效然鄙意須加入西洋參石膏本經藥方為至善此症輕者飲食如常初無痛苦稍延至旬日而轉為痰喘身熱者若初起時妄用張氏方之粉葛馬勃殭蠶等味或以水麝等藥吹喉未有不轉輕為重者余大小女恰犯此弊本春三月餘友蔡拔萃逸仲曾患此以婚期在邇約三五日之內頗著急余曰無患也以此方略加減與之日再服二日內全痊加減喻氏清燥救肺湯西洋參宜入煎生石膏杵碎布包大麥冬去心開用生粉草切片苦杏仁去皮尖杵冬桑葉生用枇杷葉刷去毛生用露更佳金銀花露分沖金汁宜取真者分沖上共九味不務定分兩者以病有輕重宜臨時斟酌也如法用清水煎二沸去渣衝入花露金汁分二次溫服日再劑甚則三如平素痰濕重或服藥數劑後覺胃中微有寒意勿怪當守服唯量加入婁貝枳橘半夏旋覆等味鄭梅澗先生養陰清肺湯麥冬一錢二分湖丹皮八分生甘草五分貝母八分大生地二錢生白芍八分原注體虛加熟地或生熟並用熱甚加連軺去白芍燥甚加天冬茯苓按此味未妥如有內熱及發熱者亦不必表藥照前方治之其熱自退辨手少陽標病第六白喉病症如前喉間紅腫而痛甚則頸項亦腫初起輒多痰涎此太陰燥火挾有少陽相火也白虎青龍湯主之間用青黃散不時吹入喉間以消腫去涎若輕者可用張氏神功辟邪散去葛根青果馬勃殭蠶此太陰燥火挾少陽相火為病也發白雖為肺經伏火亦往往挾少陽風熱而發經言一陽之脈本主手少陽三焦而言獨本篇少氣善咳之條王注謂通主膽及三焦是三焦與膽同司相火其病故每相牽涉唯膽火之動中必挾風膽者寄位於肝火熾而風未嘗不動也此條正屬風火交煽循經絡而上與外感時邪相搏不得驟發鬱於喉間而成紅腫甚則連頸項亦腫火熱上逼其勢有升而無降則痰涎遂從上行此皆少陽標病故治法須參苦泄唯處處護防燥火不致治標而礙本方為合度白虎青龍湯以石膏為君仍重本病佐以本通板藍直降少陽銀花連翹善解上焦之結熱蟬蛻桑葉兼清風熱而下行貝母降氣逆能消痰冬地保肺液而潤燥牛蒡泄少陽蘊釀之熱青芩達三焦越上之邪故二味皆在不忌此為少陽太陰通治法也勢既陡發痰腫則消腫豁痰吹喉之法亦不可緩唯不得輒加苦燥若輕者風熱既淺標病自輕即加減神功辟邪散亦足中病雖無石膏涼入本經而冬地甘寒已得潤燥唯葛根溫升陽明青果酸斂厥陰尋常溫熱已在所忌況燥氣膹郁乎馬勃殭蠶皆能助燥故並去之白虎青龍湯生石膏木通貝母去心杵桑葉生用連翹牛蒡子生用杵板藍根銀花蟬蛻去足翅麥冬去心生地鼠尾青芩上藥十二味清水煎二服日再劑或三太陰本病盛少陽標症輕者去黃芩牛蒡子加西洋參倍石膏地冬標症獨盛者以黃芩易龍膽草痰涎壅盛者仍用牛蒡子或衝入鮮萊菔汁牛黃減冬地加杏仁旋覆蔞皮吹喉青黃散飛青黛西牛黃老式大坭冰少許新式者切不可用西瓜霜西月石濂珠上藥研極細用竹管吹入若咽燥者用上白蜜調敷或鮮嫩側柏葉搗汁調亦可燥甚者不得用吹喉法加減張氏神功辟邪散生地貝母麥冬去心用鼠尾青芩連翹甲木通銀花蟬蛻去翅足牛蒡子生用杵上藥九味水五杯煎取三杯分二次溫服日再劑辨手少陰標病第七白喉病症如前初起心煩舌根微硬尖絳者此太陰燥火挾有少陰君火也朱白雙清散主之輕者張氏神功辟邪散去葛根殭蠶黃芩馬勃蟬蛻青果加紫地丁竹葉生梔仁燈心草此太陰燥火挾少陰君火為病也心肺同居上焦去喉嚨最近肺金不肅燥氣不行首先犯心心為火臟切近肺位君火一沸肺先受之故尋常溫熱最易傳變況當燥火互相沖激耶心煩者內熱自盛也少陰之脈循喉嚨絡舌本燥火熾而心營灼故舌根微硬甚則尖絳朱白雙清散重瀉少陰獨勝之熱與上條少陽標病對峙蓋此二證實白喉中最多之候亟宜留意上條以少陽立論故黃芩龍膽治法不忌苦泄此條參重少陰故黃柏木通專藉苦降連翹梔子清包絡之內蘊桑葉杏仁宣肺金之結熱元參瀉心火以清營地丁解蘊釀之熱毒二味尤為少陰清熱涼血之要藥唯處處不沒燥火本病故二方皆以石膏為君而不出冬地若輕者火勢既微即潤燥清熱已中竅要無事重用苦寒以助燥即神功辟邪散加減用之朱白雙清散生石膏黃柏麥冬去心用生梔子生地紫花地丁連翹甲木通杏仁去皮尖杵潤元參桑葉上藥十一味水五杯煎取三杯分二次溫服日再劑或三若燥甚陰涸急宜保液加西洋參犀角倍冬地元參火勢劇喉腫且紫者急加涼血解火毒之藥如紫草丹皮金汁痰涎壅盛者加牛黃或間用青黃散加減神功辟邪散生地連翹甲牛蒡子生用杵麥冬去心用淡竹葉木通貝母生梔仁紫花地丁金銀花燈心草上藥十味水五杯煎取三杯瀝去渣分二次溫服日再劑辨三經標本並病第八白喉病以上三經悉見者隨證輕重參用三經藥治之若火毒盛極喉間紫脹甚則項背俱腫危在頃刻者急宜於紅腫處用刀針刺破出惡血以殺其勢或用吹喉法三經指太陰少陽少陰而言也標本發病各有輕重隨證治之法無不愈然有三經並病太陰少陽少陰之候俱見者亦各視其勢之輕重按法施治若少陽標證獨甚即重用少陽之藥少陰標證獨甚即重用少陰之藥參觀前後心法自明若火勢太盛有非藥石所及者急用刀針夫白喉本忌刀針前人往往垂誠今言可刺蓋亦有至理在焉若不紅不腫不痛咽乾無痰全系太陰燥火者肺陰必已受傷其間全賴一點陰血為自保之地今又刺破不敗何待若挾少陽少陰標症實火太盛鬱於喉間而成紅紫甚則腫及項背其來勢之急頃刻斃命豈可不急刺出惡血以泄其氣然亦指異常重症而論不得已而用之非常法也至於發白處仍不可犯醫者慎之曩嘗聞耐修氏言其戚汪姓之女及婢相繼患此鑑於甲醫之失不敢服藥令老嫗挖去白磈出涎血鬥許而愈一月後汪自繼病亦用其法而病不減自言幾不解其何理遂委之於體質之強弱命數之否泰此語竊嘗疑之後聞醫友薛云如曾言其妻於丙申秋患此用刀針刺破紅腫處尋愈及本年林友之女亦病此喉間紅腫非常肩背胸項等處俱紅腫鼻中出血余言此症必須用刀針僅服藥無效其家守邑醫之言不敢破後至數日吐惡血數碗而斃始恍然於汪姓女婢之症及薛友之妻均系少陽少陰之標病風火之勢急故得破而愈汪君專系太陰燥火本病破之非徒無益必又速禍此中源流甚微安可不悉心考究窮極其只細徒以命數杳緲之談以卸責恐未盡格物窮理之功矣辨救誤上第九手太陰本病症如前初起咽燥無痰七八日後忽痰聲漉漉甚則喘促心煩此必誤治或遷延日久肺火熾盛引水自救吸聚五液而為痰急用三炁降龍丹主之忌一切苦燥化痰藥如牛黃膽星婁貝等味尤不可用冰麝吹喉藥以助燥初起即多痰涎挾有風火者不在此例此為白喉極重之候人但知痰聲漉漉乞靈於膽星牛黃喘促不寧取效於婁貝葶藶一試不驗且重用之卒至痰喘愈甚束手無策遂委之於病不可為不知此證純系太陰燥火熾盛肺液涸極勢若燎原吸聚周身陰液以自救於是龍雷之火隨腎水而上逆遂驅一切陰濁壅於喉嚨之間悉化為痰此痰實系陰火沖激而成故非大清涼合甘鹹寒大劑不能下降三炁降龍丹導龍歸海之藥也龜板牡蠣真珠母得至靜之精介以潛陽故名三炁冬地西洋參專保肺汁阿膠白芍兼導龍雷石膏直清燥火墜一切之熱痰犀角通利喉嚨載諸藥以下行旋覆竹茹用以代水使重而不滯尤能疏通經隧蓋此症為白喉或經誤治或遷延日久必有之病不明治法最足誤事余長女曾病此咽乾音啞喘促心煩痰聲漉漉如潮大便泄張氏所列不治之候已居其八竟以此方日服三劑獲效一劑而大便止喘促稍安再劑而痰聲如失世醫不知本源每逢痰喘悉以牛黃膽星為主不知二味為足厥陰少陽消痰火專門之藥與此症風馬無關且苦能助燥並在所忌其他婁貝葶藶辛燥更不可問矣若初起即多痰涎挾有少陽少陰風火標病則消痰降火門法自在陰藥不可亂投此中竅會亟宜領取三炁降龍丹西洋參生石膏海浮石牡蠣生用阿膠或用燕窩白芍生地黃敗龜板珍珠母麥冬去心犀角上藥十一味以旋覆花荊竹茹先煎代水服時衝入荊竹瀝鮮萊菔汁如痰涎壅盛藥不得下加入白蘇子另煎衝入待藥得下即宜撤去甚則微滴生薑汁數點為引小兒數齡以內用藥雖當酌量然亦不可過輕輕則不得沉降之性轉足以助痰矣辨救誤下第十白喉病或經誤治始終在手太陰者治以上法其或累及他經當細審病證循經用藥不可遽辭壞病模糊施治誤人性命白喉為肺金燥火本病肺為華蓋為百脈之宗肺氣病最易傳染各經脈而白喉亦然若始終在手太陰本病治以上法其有累及他經當細別源流循經用藥茲將十二經傳變病候用藥關鍵略表途逕於下假如三經本症未罷熱邪陷入厥陰四肢掣動或痙厥者急宜通絡息風於三經本方加羚羊角牛黃鮮地龍絲瓜絡忍冬藤其陷入足少陰但欲寐腰疼身熱數飲者宜於滋陰中寓泄少陰邪火於手太陰本方加黃柏元參穭豆皮龜板或合大補陰丸瀉南補北法其陷入足陽明胃腑便秘腹疼拒按者此係實火內結宜本方合宣白承氣或竟用吳氏增液承氣法其陷入足陽明胃經大渴大汗者本方倍石膏西洋參加知母粳米如人參白虎法其陷入足太陰脾經頭重頰痛顏青欲嘔熱爭不可用俯仰腹滿泄宜本方加石斛生草扁豆子石蓮肉或初起過服硝黃大便溏泄不止脾氣受傷下陷者宜先服健脾藥如四君子湯加查肉炒扁豆內金之類甚則甘附片亦可暫用泄止再治本病其風火熾盛肝脾相賊腎水不攝者須前方重加生牡蠣如吳氏一甲煎法不可見泄即指為脾寒漫用溫澀也此皆白喉救誤之法不過略示途逕其細密處仍宜臨時變化斟酌妥善庶無負司命之責辨善後第十一白喉病或已誤或未誤以法治之當無不愈愈後飲食起居如常者不必服補養藥如肺陰未復可用補土生金法張氏養正湯去花粉加制甘草沙參主之數月後喉間仍介介如梗者前方加歸身黃耆甚則用東垣甘溫法白喉為燥火爍金善後自宜清潤甘淡以補土生金張氏養正湯最為合度去花粉不可令復涼也或過服寒涼以後營血往往受傷每有終年累月喉間仍介介不已此必重用歸耆藉甘溫以和調營血蓋當時一味寒涼必有餘熱滯入營衛隧道郁久不達勢必復蒸先賢陸九芝所謂過服冬地易發骨蒸勞熱真有得之言也善患白喉愈後數月喉間常覺介介後因中寒服大甘溫藥始痊主講自京都歸言北方此病甚多愈後服溫養始能復原些言適符合長女同時患此於初起醫治不得法未能疏通經隧致餘毒流入骨髓次年仍發青腿牙疳頗重醫治月餘始痊張氏養正湯生玉竹淮山藥白茯苓熟地黃生地黃生白芍制首烏女貞子北沙參制甘草麥門冬去心上藥十一味水五杯煎取三杯分二次溫服辨外治第十二白喉病手太陰本症未罷始終不得用吹喉法初起即紅腫痰涎挾有風火標症者間用吹喉蓋風火來勢自急且易為痰不參外治恐難速效大凡時疫喉症多因風火挾痰沖激於喉嚨一線之地猝不得出遂致頃刻腫閉其內臟腑初無大病此時服藥不及唯有用辛散藥吹喉以吐痰涎故外治之法為喉科要訣獨此症咽乾無痰不痛不腫純系太陰燥火爍金肺汁內涸滋之不暇豈可復用辛散以吹喉善見有起初無痰用吹喉藥後反覺痰聲漉漉實因燥火重得辛香以張其焰也若挾少陽少陰風火標症紅腫異常痰涎壅盛則吹喉之法亦可間用輕者以青黃散重者以張氏雄黃解毒丸或白填鴨散其用雄黃解毒丸者實以萬分危急之際不得已權宜而用非常法也然其間實有至理巴豆大辛大熱雖為白喉所最忌而斬關奪隘峻利無比下咽後未有不直達肛門與尋常辛烈之品不能驅痰下墜反足助火上焰者迥乎不同此症若至痰氣壅閉藥不得入多因誤治後火勢燎原所致此時若僅用張氏之瓜霜散耐修子之鳳衣散與外治之異功散非但無益恐適以增病唯暫借此藥開通徑路隨以大清涼或甘鹹寒大劑頻頻灌服即可救效斷不至停留上焦以助火勢也此所謂出奇制勝非胸有成竹者不能用亦且不敢用也白填鴨散未曾試驗大概非手太陰本症所宜痰涎壅盛者亦可備用較錫類散尚優余長女曾以錫類散吹喉即時音啞蓋珠黃人指甲壁錢冰片象牙等味既燥而又澀皆在大忌張氏雄黃解毒丸透明雄黃研細水飛淨鬱金巴豆霜上藥研細用米醋煎濃汁面和為丸如綠豆大每用四分茶湯泡軟杵熔送下小兒減半白填鴨散見白喉忌表抉微辨禁忌第十三白喉禁忌諸家言之甚詳茲條列於下其尤須發明斟酌者略參如左忌升提並吐白喉為手太陰燥氣化火治宜滋陰清熱即挾有少陽少陰木火標症亦宜仿吳氏溫熱法清中夾疏慎不可用升柴粉葛等溫升之味以助其焰此理吳氏辨之甚詳可熟玩也張善吾除瘟化毒神功辟邪諸散皆首用葛根恰犯所忌吐法為六淫要訣唯此症大忌恐一經湧吐其勢即上竄也忌溫散發汗麻桂羌防為寒濕家發汗之祖藥治溫熱者已嚴加禁忌況白喉純系燥火豈可復投發汗致傷津液忌大下亡津喉症如火毒蘊結於腸胃之間腹痛便閉者均可用下法唯白喉切宜謹慎用之蓋燥火爍金肺汁內涸治當以養陰清燥為主井非一二劑所能了事若大下之後胃氣告匱陰藥安能任受不獨重傷津液也其必不得已者可仿吳氏宣白承氣法不可直用仲景之三承氣也忌刀針喉科用刀針者多由風火鬱結於血分紅腫痛閉危在頃刻必須刺取惡血以泄其氣使火氣自衰今白喉來勢既緩自可按法施治何必漫用刀針致傷陰血唯太陰本症較輕少陽少陰風火標症較重紅腫異常甚則紫項背俱腫者可間用刺法其發白處仍不可犯此理於上三經同病條略加闡發可參玩也忌病重藥輕此症輕者須日服二劑重者三四劑不等慎不可一二劑後見病不退漫施雜藥癸巳春善及二女一子於數日間次第傳染每人服藥三四劑家庭遍列藥碗司煎者日以二人替換二旬後始獲痊可唯夭一小子及今思之亦由初起醫治不得法然是時非得同院諸友反覆調護恐更不可問矣忌苦重助燥白喉病手太陰本症未罷始終不得用苦燥藥若挾風火標病必須參用苦泄此理上論辨之頗詳茲不復贅耐修子謂黃芩一味涼入細竅此謬論也黃芩若此則連柏膽草犀角石膏等味更何如耶不知芩連膽柏性寒而味苦苦稟火化適足以助燥濕熱症用之者以苦能燥濕寒能清熱也若白喉燥火本病應以柔潤滋養之藥為主佐以泄火清熱苦味中除黃柏外黃柏雖苦卻有津液試嚼之滋黏滿口均在禁忌唯標症實火太盛苦泄法自亦不禁識者察之辨張氏無治之症第十四白喉本無壞病不識本源適足礙事若經誤治者症必危險亦當悉心講求設法救補慎不可泥張氏之言委諸無治所列之症十一條詳辨於下一白塊自落此候極多最不足怪嘗見有懸丁之旁虛懸白片色若雞脂遇大咳輒自落其症後亦無恙餘二小女亦然二七日滿白不退此候亦屬尋常余喉間白點數處自正月初旬至月杪始退三咽乾無涎此真手太陰燥火本病宜重用西洋參石膏冬地甚則用官燕阿膠真珠母牡蠣切不可用水麝吹喉藥斷無不效四服藥大便不通此候大概非實熱鬱結腸胃即肺陰枯涸已極宜用宣白承氣加入滋養藥否則用吳鞠通增液承氣湯惟不可用峻利之品五未服藥大便泄此候有因脾熱所致如內經所謂熱爭腹滿泄是也可用以上救誤法或因肝風大煽必須重用一甲煎六兩目直視此實危脫之候多不可救然間有因痰氣壅結氣不得下者可用鮮萊菔汁或竟用張氏消毒丸以圖萬一七痰壅氣喘此為白喉危脫時必有之候可見此症必須揭重手太陰主治如系痰火壅滯可用大辛涼加牛黃等味或因誤治以致肺火太盛聚液為痰即牛黃亦覺苦燥必須用甘鹹寒大劑不可見痰而漫用辛燥也八大便溏泄不止此症多因火毒蔓延或過用大下所致然亦有多獲效以上數症余大女曾患此連服大劑三炁降龍丹加一甲煎三劑獲效不可見此候即指為不治也九唇面俱青此候多由火毒陷入足太陰如內經所謂脾熱病者頭重頰腫顏青是也或肝火盛極本色發現者亦有此候十藥不能下此真極重之候多不可救如系痰氣壅結者可竟用消毒丸希圖萬一十一音啞無聲此係肺陰涸熱宜用泄火滋陰法余長女亦然因誤用錫類散吹喉即時音啞及後諸症全痊半月餘始覺漸漸清朗如遇是候須參入燕窩阿膠等味辨耐修藥表並藥忌第十五白喉病辨症既明首講用藥耐修所列正將猛將次將四層藥表井用藥禁忌抉擇頗為簡當然選藥不多未免印定後人眼目且議論多不根於經典尤難津逮後學茲取其意而詳辨之耐修之言曰治之之法唯有以厚重之藥鎮其上層以清涼之藥潤其次層即此二語便覺大錯大凡醫家用藥病在上焦宜輕清病在下焦宜重濁故上焦分兩須輕宜於散下焦分兩須重宜於丸上焦藥宜輕煎頻服下焦藥宜濃煎頓服豈有以厚重鎮上層清涼潤下層之理此稍涉醫學者無不明析不待精博群書也唯所收上層藥中如冬地為滋陰必用之藥石膏為燥火專門對症之藥膽草為足少陽泄實火之藥川柏為手少陰瀉實火之藥犀角為手少陰清虛火之專藥暗與病合亦非如伊之所謂鎮也如以為鎮則次將中之粉葛極能升胃陽行胃陰為白喉最忌之品何鎮之有其次層藥中如婁貝丹皮板藍桑葉枇杷葉梔子木通等味為此症標本疏通經隧之要藥亦非如伊之所謂潤也倘以為潤則婁皮木通梔子兜鈴皆苦能助燥何潤之有其中層下層之枳樸神麯查肉陳皮或因平素脾胃濕痰蘊滯或因驟服寒涼膩藥中氣不能健運故亦可用非常法也否則炒麥芽亦能升發火勢何可輕投至硝黃更不易用必須腸胃間積有實熱如古人所謂痞滿燥實堅痛諸候者方可酌用萬不可輕易一試也鄙意此症於初起時或經誤治或已傳變必須認明病源或燥火獨病或風火兼病詳別經絡或手太陰獨病或少陽少陰兼病對症用藥自能絲絲入扣不可模糊籠統以寥寥數語印定後人眼目也補義余纂白喉條辨自丁酉出版迄今一紀矣於前賢白喉諸書議論間有未愜於心者莫不詳加討論斟酌妥協以期悉合病情治法而後已顧獨於忌表二字尚嫌疏釋未能盡致心竊病之蓋白喉為太陰肺經伏燥苟無時邪感觸自不宜無故表散兆成燎原之禍若確屬挾有時感表症者則解表自難容緩如前第五條所言挾溫熱者可加薄荷荷葉扁豆花之類挾寒濕燥三氣者雖麻葛前蘇香薷藿香等皆可酌用或外感里燥並重亦須表裡清疏二者兼顧但先使表邪得解縱白髮滿喉則施治亦自易易矣唯不得浪用薑桂辛熱引邪入里之品耳嘗見時醫未讀白喉忌表抉微者動輒表散為禍固烈乃有已見此書未能洞徹原理往往坭守忌表二字縱有外感甚厲開手即一味清滋轉使外邪陷入里燥愈甚卒成爛喉等病斃命者所在皆有見之實堪痛悼夫六淫病邪氣從外入者無不以解表為要務白喉雖為太陰伏燥法宜直從肺經清降苟外感未去輒先注意於此且有於清降之中再亂入苦重滋膩之品則外邪未有不被牽率而內陷終致清疏兩無所施坐視殞命者傷何如之僕二少女年甫十齡曾於某年夏月往鄰里觀劇時值溽暑鬱蒸當數日前西風大作夏行秋令故有白喉症發現加之劇場人氣醞釀歸即寒熱大作肢體如廢腹痛餐泄舌苔灰濁而喉間又復發白僕權其輕重理宜解暑去濕為先蓋治白喉不外清滋之品暑濕得解則用藥自無牽掣矣遂用香薷飲合正氣散加減再入石膏鮮葦莖二味略顧肺中之燥石膏為治燥火主藥其性兼能達表清裡熟讀仲聖書者自能得其旨歸故喉間一見白磈白片此味即不容緩乃時醫於冬地石斛元參等味習為故然浪用不怪視石膏反不敢輕於一試識力不真往往坐失病機殊堪太息二劑後表解體鬯痛止泄愈而喉中日勢轉劇幾至滿喉皆是乃急轉用西洋參石膏葦莖元參杏仁枇杷葉等味三劑白去八九喉中唯覺燥痛遂再加羚羊鮮生地二味病遂全愈使當初下手時疑忌香薷藿香辛燥與白喉有礙把握不定不以全力專去暑濕恐遺禍有不可勝言矣要之白喉病夾症頗夥唯太陰伏燥獨發者自當以清降滋潤為重如辛散苦重皆在所禁前已辨之詳矣若挾六淫時感自當濕因濕治寒因寒治暑熱因暑熱治先解其表則本症治法自無顧慮斷不可坭守忌表二字使外感與伏燥互相牽引譬如觀奕一著錯則全局輸矣吾願世之治白喉者因此意神而明之或能與吾民同躋壽域也故不辭繁複復補此篇於後宣統元年太歲己酉十月慄盦漻甫再識於湫漻齋
