front:
  text: 序六氣感人以燥證為難明燥氣發病以白喉為最險險而難則病不擇醫醫不識病遘輒遭夭死亡接踵而生人之禍亟矣其病則在於醫不讀書與讀而未會其通素問陰陽應象大論生氣通天論均脫秋傷於燥一節而秋燥之病變始隱國朝嘉言喻氏自南沈氏始各以其獨得之見著為方論吳氏鞠通融會其說節以入書於是燥證始略有門逕可循然於白喉猶未之及吾友陳慄庵院醫之良也癸巳春闔門患白喉者四人長女最劇時就余與何君志石參議方劑書中所定三炁降龍丹等皆新制驗方也嗣以愛子不起盡發院中藏書窮究旨要始悟白喉一證悉屬燥火因作訂正論一卷乞鑑定余謂醫以切實適用為要不必惑於近人體例之說可仍仿吳氏例改為條辨刪削未果會學堂開辦醫報隨期課書慄庵羸而善病因囑女夫其高弟胡鑫就原稿詮次成書隨報刊行雖條僅十五而綱舉目張犁然各當不僅為白喉家正法眼藏而一切喉科病變方法悉寓焉三折肱九折臂不綦信歟自來論秋燥者無慮十數家似以吳氏為較長然於義例則亦尚未周其言曰燥氣為病輕則為燥重則為寒化氣為濕復氣為火則實不根之言窒而鮮通夫天有六氣而火分君相故經但言寒暑燥濕風五氣應時布令則為平氣本不為病其病者勝氣也如燥氣盛行則擾動四氣何言之行於所生則氣感而為濕行其所生則氣泄而為寒行其所勝則氣化而為風行所不勝則氣伏而為火推之六氣皆同斯例蓋金勝則木受制而風證起如內經所稱歲金太過肝木受邪兩脅滿且痛引少腹及陽明司天肝氣上從掉振鼓慄筋痿不能久立丈夫癲疝等證皆燥而化風也即吳氏亦有燥金司令頭疼身寒熱胸脅痛甚則疝瘕痛者桂枝柴胡各半湯加味主之之文乃於化氣獨不知有風是僅知六氣之當補燥氣不及悟燥氣之尚能化風顧指失臂六氣終於不全一間未達則亦九仞之井類也昔宋孫兆校正內經正謬訛者六千餘字增注義者二千餘條而秋傷於濕不復悟有脫簡將貫穿錯綜會通仍待之其人歟嗚呼斯道沉薶埋垂四千年矣秋燥之論至本朝而始有定說白喉之源至吾院而始有專書何其幸也慄庵開悟邁其曹醫院初創首先畢業書成遠近仿治多所全活因樂為弁其簡端遂縱論燥證傳變微特箴砭吳氏使成全璧且亦用以廣吾同院之意使知燥氣明則六淫可推六淫清則百病可治僅秋燥白喉云乎哉舉一反三貴會其通是在世之善讀是編者時光緒二十四年歲次著雍閹茂律中仲呂東甌陳虯志三書於天津紫竹林自序白喉險症也靈素以來未詳著錄國朝道光間湖南陳氏雨春始著白喉嚨證論見白喉捷要常敘其鄉人瀏陽張善吾紹修本其意作白喉捷要大旨言足三陰受病傳之於肺已失白喉本來面目而用藥又不出風火喉痹之範圍與手太陰燥火了無關涉鄭氏梅澗所著重樓玉鑰言此症或遇燥氣流行而發用藥以清肺養陰為主頗為中的然語焉不詳得失參半似未能洞徹源流者如既言或遇燥氣流行而發又言此症在少陰一經熱邪伏其間盜肺金之母氣云云用藥既以養陰清肺為主又言只宜紫正散夫紫正散之荊芥防風荊皮細辛與養陰清肺湯之冬地白芍丹皮奚啻冰炭何鄭氏竟相提並論也光緒戊子京師是症大發有耐修子者以戚串中多遭其厄悉心講求托之神道採二家之言著白喉治法忌表抉微選擇頗為簡要然此君非素業岐黃之術者於受病之源流經絡用藥之色味氣性茫無真知灼見故語多不根尤不足以津逮後學癸巳春余及二女一子於數日間次第傳染壬辰秋冬之交天久不雨燥氣盛行冬至後大霜雪尋常湖漵冰厚寸許甌郡地氣極暖不見此氣候者已六七十年至立春後雨水驟至是症輒大發聞郡城醫者多以辛溫表散從事小兒遭厄者甚夥長女以張氏法治之幾至不起幸以大辛涼合甘鹹寒法日進三大劑獲效張氏所列無治之症十一條已居其八次女少子遂悉用養陰法次女愈而少子夭此中疑團幾不可破甲午秋季少女時才周歲患伏暑病身熱痙厥痰嗽而喘投以清熱化痰通絡息風劑痙厥愈而諸症不減至日晡時痰喘愈甚與白喉病將絕時形象宛然無異急用前方加入西洋參石膏大辛涼法與之痰喘頓止而身熱亦愈始恍然於白喉病之標本傳變從前醫治之或得或失一一瞭如指掌且深悉張氏鄭氏耐修氏三先生之書雖各有心得實未能窮極源流也於是潛心探索彙集眾長證以經誼參以閱歷遲之數年作白喉訂正論一卷呈政於蟄廬主講主講曰是論雖詳然頭緒繁多篇幅長冗恐閱者未易貫徹盍仿吳鞠通氏著溫病例為白喉條辨庶幾綱舉目張作者既易於發明閱者復易於尋繹余曰善退而作條辨一十五條稿既脫因為敘其大旨雖當仁不讓於張氏鄭氏耐修氏三先生之言間多指摘然非三先生開先河之功余亦安能遽集其成也後有作者倘能闡發微旨匡茲不逮豈特余與三先生之幸抑天下生靈有厚望焉光緒二十三年歲丁酉夏月
